<svg width="680" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-size="16" font-weight="600" fill="#2C2C2A">Music Discovery Agent — System Architecture</text>

  <!-- Step 1: User Input -->
  <rect x="220" y="42" width="240" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="62" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">User input</text>
  <text x="340" y="80" text-anchor="middle" font-size="11" fill="#5F5E5A">Natural language request</text>

  <!-- Arrow 1→2 -->
  <line x1="340" y1="92" x2="340" y2="118" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 2: Planner -->
  <rect x="200" y="120" width="280" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="140" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">Planner agent (LLM)</text>
  <text x="340" y="158" text-anchor="middle" font-size="11" fill="#534AB7">Parse intent → UserProfile</text>

  <!-- Arrow 2→3 -->
  <line x1="340" y1="170" x2="340" y2="198" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 3: Recommender -->
  <rect x="200" y="200" width="280" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="220" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">Recommender engine</text>
  <text x="340" y="238" text-anchor="middle" font-size="11" fill="#0F6E56">Weighted scoring on catalog</text>

  <!-- Song Catalog (side) -->
  <rect x="55" y="208" width="120" height="36" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="115" y="231" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">Song catalog</text>
  <line x1="175" y1="226" x2="198" y2="226" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Arrow 3→4 -->
  <line x1="340" y1="250" x2="340" y2="278" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 4: Explainer -->
  <rect x="200" y="280" width="280" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="300" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">Explainer agent (LLM)</text>
  <text x="340" y="318" text-anchor="middle" font-size="11" fill="#534AB7">Generate friendly response</text>

  <!-- Logger (side) -->
  <rect x="510" y="288" width="110" height="36" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="565" y="311" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">Logger</text>
  <line x1="480" y1="306" x2="508" y2="306" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Arrow 4→5 -->
  <line x1="340" y1="330" x2="340" y2="358" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 5: Evaluator -->
  <rect x="200" y="360" width="280" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="380" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">Evaluator (guardrail)</text>
  <text x="340" y="398" text-anchor="middle" font-size="11" fill="#993C1D">Confidence score + validation</text>

  <!-- Refinement loop (left side) -->
  <text x="148" y="325" text-anchor="middle" font-size="11" fill="#854F0B">Low confidence</text>
  <path d="M200 385 L140 385 L140 145 L198 145" fill="none" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Arrow 5→6 (pass) -->
  <line x1="340" y1="410" x2="340" y2="438" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="365" y="430" font-size="11" fill="#0F6E56">Pass</text>

  <!-- Step 6: Output -->
  <rect x="200" y="440" width="280" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="460" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Final output</text>
  <text x="340" y="478" text-anchor="middle" font-size="11" fill="#5F5E5A">Recommendations + explanations</text>

  <!-- Test Harness (bottom) -->
  <rect x="220" y="520" width="240" height="36" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="543" text-anchor="middle" font-size="13" font-weight="500" fill="#412402">Test harness (eval script)</text>
  <line x1="340" y1="490" x2="340" y2="518" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="450" y="520" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="468" y="531" font-size="10" fill="#5F5E5A">LLM module</text>
  <rect x="450" y="538" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="468" y="549" font-size="10" fill="#5F5E5A">Guardrail</text>
  <rect x="450" y="556" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="468" y="567" font-size="10" fill="#5F5E5A">Scoring engine</text>
</svg>
